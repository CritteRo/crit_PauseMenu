<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link href="style.css" rel="stylesheet" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CritteR's Pause Menu</title>
		<script type="text/javascript" src="script.js"></script>
	</head>
	<body style="opacity: 0; margin-top: 50vh">
		<div class="main-container">
			<div class="title-container">
				<h1 class="main-title" data-label="MAIN_TITLE">Pause Menu</h1>
				<p class="main-description" data-label="MAIN_DESCRIPTION"></p>
			</div>
			<div class="content-container">
				<div class="left-container">
					<button
						class="noselect left-container-button socialsHeader"
						onclick="togglePanel(this)"
						optionID="socials"
						leftSide="true"
						panel=".socials-panel"
						tabindex="0"
					>
						<span class="blur" data-label="BUTTON_SOCIALS">SOCIALS</span>
					</button>
					<button
						class="noselect left-container-button mapHeader"
						onclick="togglePanel(this)"
						optionID="map"
						leftSide="true"
						panel=".map-panel"
						tabindex="0"
					>
						<span class="blur" data-label="BUTTON_MAP">MAP</span>
					</button>
					<button
						class="noselect left-container-button settingsHeader"
						onclick="togglePanel(this)"
						optionID="settings"
						leftSide="true"
						panel=".empty-panel"
						tabindex="0"
					>
						<span class="blur" data-label="BUTTON_SETTINGS">SETTINGS</span>
					</button>
					<button
						class="noselect left-container-button galleryHeader"
						onclick="togglePanel(this)"
						optionID="gallery"
						leftSide="true"
						panel=".empty-panel"
						tabindex="0"
					>
						<span class="blur" data-label="BUTTON_GALLERY">GALLERY</span>
					</button>
					<select
						class="left-container-language-select"
						style="display: block"
						tabindex="0"
					>
						<option class="language-option-template" value="">
							Language
						</option>
						<option
							class="language-option-template language-option"
							value="en"
						>
							🇬🇧 English
						</option>
					</select>
				</div>
				<div class="right-container">
					<nav class="header-nav">
						<button
							class="noselect header-button infoHeader header-button-active"
							onclick="togglePanel(this)"
							optionID="info"
							panel=".info-panel"
							tabindex="0"
                            data-label="BUTTON_INFORMATION"
						>
							INFO
						</button>
						<button
							class="noselect header-button playersHeader"
							onclick="togglePanel(this)"
							optionID="players"
							panel=".players-panel"
							tabindex="0"
                            data-label="BUTTON_PLAYER_LIST"
						>
							PLAYERS
						</button>
						<button
							class="noselect header-button closeMenu"
							optionID="leavepause"
							onclick="leaveLobby()"
							tabindex="0"
                            data-label="BUTTON_CLOSE_MENU"
						>
							CLOSE MENU
						</button>
						<button
							class="noselect header-button leaveLobby"
							onclick="togglePanel(this)"
							optionID="leaveserver"
							panel=".leave-server-panel"
							tabindex="0"
                            data-label="BUTTON_LEAVE_SERVER"
						>
							LEAVE SERVER >>
						</button>
					</nav>
					<section class="right-content">
						<!-- INFO PANEL -->
						<div
							class="panel info-panel"
							style="display: block"
							tabindex="0"
						>
						</div>

						<!-- SOCIALS PANEL -->
						<div
							class="panel socials-panel"
							style="display: none"
							tabindex="0"
						>
							<section
								class="panel-section panel-section-text"
								style="display: block"
							>
								<h3 class="panel-header-text socials-header-label" data-label="HEADER_SOCIALS">
									Social Links
								</h3>
							</section>
							<section class="socials-grid">
								<button
									class="noselect socials-button-template"
									onclick="toggleButton(this)"
									optionID=""
									url=""
									style="display: none"
								>
									<span class="socials-blur"></span>
								</button>
							</section>
						</div>

						<!-- ONLINE PLAYERS PANEL -->
						<div
							class="panel players-panel"
							style="display: none"
							tabindex="0"
						>
							<section class="players-table">
								<table>
                                    <thead>
                                        <tr class="players-table-header">
											<th class="opth-id" data-label="TBL_ID">ID</th>
											<th class="opth-player-name" data-label="TBL_PLAYER_NAME">PLAYER NAME</th>
											<th class="opth-col1" data-label="TBL_COL1">DATA COL 1</th>
											<th class="opth-col2" data-label="TBL_COL2">DATA COL 2</th>
											<th class="opth-col3" data-label="TBL_COL3">DATA COL 3</th>
											<th class="opth-col4" data-label="TBL_COL4">DATA COL 4</th>
										</tr>
                                    </thead>
									<tbody class="players-table-body">
									</tbody>
								</table>
							</section>
						</div>

						<!-- LEAVE SERVER PANEL -->
						<div
							class="panel leave-server-panel"
							style="display: none"
							tabindex="0"
						>
							<section
								class="panel-section panel-section-text-template"
								style="display: block"
							>
								<h3
									class="panel-header-text leave-server-header-label"
                                    data-label="HEADER_LEAVE_SERVER"
								>
									Are you sure you want to leave?
								</h3>
							</section>
							<section class="leave-grid">
								<button
									class="noselect leave-button disconnectButton"
									onclick="toggleButton(this)"
									optionID="leaveServer"
									model=""
									style="display: block"
								>
									<span class="leave-blur" data-label="BUTTON_DISCONNECT">Disconnect</span>
								</button>
								<button
									class="noselect leave-button exitGameButton"
									onclick="toggleButton(this)"
									optionID="quitGame"
									model=""
									style="display: block"
								>
									<span class="leave-blur" data-label="BUTTON_QUIT_GAME">Quite Game</span>
								</button>
							</section>
						</div>

						<!-- EMPTY PANEL -->
						<div
							class="panel empty-panel"
							style="display: none"
							tabindex="0"
						></div>

						<!-- MAP PANEL -->
						<div
							class="panel map-panel"
							style="display: none"
							tabindex="0"
						>
							<button
								class="noselect"
								onclick="openMap()"
								style="
									display: inline-block;
									width: 100%;
									height: auto;
									justify-self: stretch;
									align-self: stretch;
									padding: auto;
									opacity: 0;
								"
							>
								<!-- button text -->
							</button>
						</div>
					</section>
				</div>
			</div>
		</div>
	</body>
</html>
